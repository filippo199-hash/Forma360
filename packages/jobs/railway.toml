# Railway service config for the `worker` (BullMQ) service.
#
# Railway picks this file up when the service root is set to `packages/jobs`
# in the dashboard. See docs/deployment.md.

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile"

[deploy]
startCommand = "pnpm --filter @forma360/jobs start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# No public domain; no healthcheck URL.

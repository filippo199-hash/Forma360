# Local Postgres + Redis for tests that want real services (wired in PR 11
# when we add a Docker-backed tRPC integration test).
#
# Day-to-day unit + integration tests use pglite + in-process Redis mocks, so
# this file is opt-in: run `docker compose -f tools/test-db/docker-compose.yml up -d`
# only when you specifically want a realistic Postgres runtime.

services:
  postgres:
    image: postgres:16-alpine
    container_name: forma360_test_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: forma360_test
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d forma360_test']
      interval: 2s
      timeout: 2s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: forma360_test_redis
    ports:
      - '6380:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 2s
      timeout: 2s
      retries: 10
